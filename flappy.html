<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flappy Bird</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }

    canvas {
      border: 3px solid #c0392b;
      border-radius: 4px;
      display: block;
      cursor: pointer;
    }

    #ui {
      color: white;
      text-align: center;
      margin-top: 1rem;
      font-size: 0.85rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<canvas id="c" width="400" height="600"></canvas>
<div id="ui">Click / Space / Tap to flap</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = canvas.width;
const H = canvas.height;

const GRAVITY    = 0.45;
const FLAP_POWER = -9;
const PIPE_W     = 58;
const GAP        = 160;
const PIPE_SPEED = 2.8;
const BIRD_X     = 90;
const BIRD_R     = 16;

let bird, pipes, score, best, state, frame;

function init() {
  bird  = { y: H / 2, vy: 0, angle: 0 };
  pipes = [];
  score = 0;
  frame = 0;
  state = 'idle'; // idle | play | dead
}

function flap() {
  if (state === 'dead') { init(); return; }
  if (state === 'idle') state = 'play';
  bird.vy = FLAP_POWER;
}

document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); } });
canvas.addEventListener('click', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

function spawnPipe() {
  const top = 80 + Math.random() * (H - GAP - 160);
  pipes.push({ x: W + PIPE_W, top, scored: false });
}

function drawBird() {
  ctx.save();
  ctx.translate(BIRD_X, bird.y);
  ctx.rotate(bird.angle);

  // body
  ctx.fillStyle = '#f1c40f';
  ctx.beginPath();
  ctx.arc(0, 0, BIRD_R, 0, Math.PI * 2);
  ctx.fill();

  // wing
  ctx.fillStyle = '#e67e22';
  ctx.beginPath();
  ctx.ellipse(-4, 6, 10, 6, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // eye
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(7, -5, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(9, -5, 3, 0, Math.PI * 2);
  ctx.fill();

  // beak
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.moveTo(13, 0);
  ctx.lineTo(22, -3);
  ctx.lineTo(22, 3);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawPipe(p) {
  const radius = 6;

  // gradient on pipes
  const gTop = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
  gTop.addColorStop(0, '#27ae60');
  gTop.addColorStop(0.5, '#2ecc71');
  gTop.addColorStop(1, '#1e8449');

  ctx.fillStyle = gTop;

  // top pipe body
  roundRect(ctx, p.x, 0, PIPE_W, p.top, radius);
  ctx.fill();

  // top pipe cap
  ctx.fillStyle = '#1a8a45';
  roundRect(ctx, p.x - 5, p.top - 24, PIPE_W + 10, 24, radius);
  ctx.fill();

  // bottom pipe body
  const botY = p.top + GAP;
  ctx.fillStyle = gTop;
  roundRect(ctx, p.x, botY, PIPE_W, H - botY, radius);
  ctx.fill();

  // bottom pipe cap
  ctx.fillStyle = '#1a8a45';
  roundRect(ctx, p.x - 5, botY, PIPE_W + 10, 24, radius);
  ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBg() {
  // sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#1a1a2e');
  sky.addColorStop(1, '#16213e');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // ground
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(0, H - 40, W, 40);
  ctx.fillStyle = '#5D8A1C';
  ctx.fillRect(0, H - 45, W, 10);

  // stars (static seed)
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  const stars = [[30,40],[80,120],[150,30],[220,90],[300,55],[360,140],[50,200],[280,180]];
  stars.forEach(([sx, sy]) => {
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawScore() {
  ctx.fillStyle = 'white';
  ctx.font = 'bold 42px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(score, W / 2, 70);

  if (best > 0) {
    ctx.font = '16px Courier New';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('best ' + best, W / 2, 95);
  }
}

function drawOverlay() {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';

  if (state === 'idle') {
    ctx.fillStyle = '#f1c40f';
    ctx.font = 'bold 48px Courier New';
    ctx.fillText('FLAPPY', W/2, H/2 - 50);
    ctx.fillStyle = 'white';
    ctx.font = '20px Courier New';
    ctx.fillText('Click or tap to start', W/2, H/2 + 10);
  }

  if (state === 'dead') {
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 48px Courier New';
    ctx.fillText('GAME OVER', W/2, H/2 - 60);
    ctx.fillStyle = 'white';
    ctx.font = '24px Courier New';
    ctx.fillText('Score: ' + score, W/2, H/2 - 10);
    if (score === best && best > 0) {
      ctx.fillStyle = '#f1c40f';
      ctx.font = '18px Courier New';
      ctx.fillText('New best!', W/2, H/2 + 20);
    }
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.font = '18px Courier New';
    ctx.fillText('Click to play again', W/2, H/2 + 56);
  }
}

function collides(p) {
  const bx = BIRD_X, by = bird.y;
  if (bx + BIRD_R > p.x && bx - BIRD_R < p.x + PIPE_W) {
    if (by - BIRD_R < p.top || by + BIRD_R > p.top + GAP) return true;
  }
  if (by + BIRD_R >= H - 40) return true;
  if (by - BIRD_R <= 0) return true;
  return false;
}

function loop() {
  requestAnimationFrame(loop);
  frame++;

  drawBg();

  if (state === 'play') {
    // physics
    bird.vy += GRAVITY;
    bird.y  += bird.vy;
    bird.angle = Math.min(Math.max(bird.vy * 0.06, -0.5), 1.2);

    // spawn pipes
    if (frame % 90 === 0) spawnPipe();

    // update & draw pipes
    pipes.forEach(p => {
      p.x -= PIPE_SPEED;
      drawPipe(p);
      if (!p.scored && p.x + PIPE_W < BIRD_X) {
        p.scored = true;
        score++;
      }
      if (collides(p)) {
        state = 'dead';
        if (score > (best || 0)) best = score;
      }
    });
    pipes = pipes.filter(p => p.x > -PIPE_W - 10);

    // ground collision
    if (bird.y + BIRD_R >= H - 40) {
      state = 'dead';
      if (score > (best || 0)) best = score;
    }
  }

  if (state === 'idle') {
    // gentle bob
    bird.y = H / 2 + Math.sin(frame * 0.05) * 8;
    bird.angle = Math.sin(frame * 0.05) * 0.2;
  }

  drawBird();
  drawScore();

  if (state !== 'play') drawOverlay();
}

init();
loop();
</script>
</body>
</html>
